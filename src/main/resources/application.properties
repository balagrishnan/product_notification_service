spring.application.name=demo

# ==========================================
# 1. KAFKA BROKER ADDRESS CONFIGURATION
# ==========================================
# TURN THIS ON when testing from your local IDE machine:
# spring.kafka.bootstrap-servers=localhost:9092

# TURN THIS ON only when packaging/deploying inside Docker containers via Jenkins:
spring.kafka.bootstrap-servers=kafka-broker:29092


# ==========================================
# 2. CONSUMER CONFIGURATIONS
# ==========================================
# Spring system default consumer group config
spring.kafka.consumer.group-id=product_processing_group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Best Practice: Bypasses strict validation check so app starts up even if Kafka takes a second to reply
spring.kafka.listener.missing-topics-fatal=false